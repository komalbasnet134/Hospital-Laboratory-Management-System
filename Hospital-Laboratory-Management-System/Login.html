<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLMS - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 30px;
        }
        .btn-custom {
            background-color: #0d6efd;
            color: white;
            border-radius: 8px;
        }
        .btn-custom:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-flask-vial text-info fa-3x mb-2"></i>
        <h3 class="fw-bold">HLMS Login</h3>
        <p class="text-muted">Enter your credentials to access the system</p>
    </div>
    
    <form>
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" class="form-box form-control" id="email" placeholder="name@example.com" required>
            </div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-custom w-100 py-2 fw-bold">Sign In</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="home.html" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
    </div>
</div>

</body>
</html>
